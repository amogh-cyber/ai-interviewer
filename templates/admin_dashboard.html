<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

    
        .sidebar {
            min-height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h4 {
            font-weight: 600;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: #fff;
        }

        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            
            <div class="col-md-2 sidebar">
                <h4 class="text-center mb-4">Admin Panel</h4>

                <a href="{{ url_for('admin_dashboard') }}" class="active">
                    📊 Dashboard
                </a>

                <a href="{{ url_for('admin_users') }}">
                    👥 Users
                </a>

              <a href="{{ url_for('admin_interviews') }}" >📄Interview Results</a>
                    
                </a>

                    <a href="{{ url_for('admin_create_meeting') }}" >
                        🎥 Create Meeting
                    </a>

                <hr class="text-secondary mx-3">

                <a href="{{ url_for('logout') }}" class="text-danger">
                    🚪 Logout
                </a>
            </div>

            
            <div class="col-md-10 p-4">

                <h2 class="mb-4 fw-bold">Welcome, Admin 👋</h2>

            
                <div class="row mb-4">

                    <div class="col-md-4">
                        <div class="card p-4">
                            <h6 class="text-muted">Total Users</h6>
                            <h2 class="text-primary fw-bold">{{ total_users }}</h2>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card p-4">
                            <h6 class="text-muted">Total Interviews</h6>
                            <h2 class="text-success fw-bold">{{ total_interviews }}</h2>
                        </div>
                    </div>

                

                </div>

                
                <div class="card p-4">
                    <h5 class="fw-bold mb-3">Quick Actions</h5>

                    <div class="d-flex gap-3 flex-wrap">
                        <a href="{{ url_for('admin_users') }}" class="btn btn-outline-primary">
                            👥 Manage Users
                        </a>
                        <a href="#" class="btn btn-outline-success">
                            📊 View Results
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
