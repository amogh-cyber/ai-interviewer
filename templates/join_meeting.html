<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Interview Lobby</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #3b82f6;
            --dark: #0f172a;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .join-wrapper {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 30px;
            max-width: 1100px;
            width: 95%;
            padding: 20px;
        }

        
        .preview-section {
            background: #000;
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #previewVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.85;
        }

        .video-status {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }

    
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 45px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .glass-card h2 {
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .label-text {
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .custom-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 14px 18px;
            color: white !important;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s;
        }

        
        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            opacity: 1;
        }

        .custom-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
        }

        .btn-join-premium {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .btn-join-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            background: #f8fafc;
        }

        @media (max-width: 992px) {
            .join-wrapper {
                grid-template-columns: 1fr;
            }

            body {
                height: auto;
                padding: 40px 0;
            }
        }
    </style>
</head>

<body>

    <div class="join-wrapper">
        <div class="preview-section">
            <video id="previewVideo" autoplay muted playsinline></video>

            <div class="video-status">
                <span style="color: #10b981; font-size: 1.2rem;">●</span>
                <span class="fw-bold">LIVE PREVIEW</span>
            </div>

            <div style="position: absolute; bottom: 20px; width: 100%; text-align: center;">
                <p class="small text-white-50">Adjust your camera and microphone</p>
            </div>
        </div>

        <div class="glass-card">
            <h2>Ready to Join?</h2>
            <p style="color: #cbd5e1;" class="mb-4">Securely connect to your interview room.</p>

            <form method="POST">
                <div class="mb-3">
                    <label class="label-text">Meeting Identity</label>
                    <input type="text" name="room_id" class="custom-input" placeholder="Enter Meeting ID" required>
                </div>

                <div class="mb-4">
                    <label class="label-text">Security Code</label>
                    <input type="password" name="password" class="custom-input" placeholder="Enter Password" required>
                </div>

                <button type="submit" class="btn-join-premium w-100">
                    Join Meeting Room
                </button>
            </form>

            
        </div>
    </div>

    <script>
    
        const video = document.getElementById('previewVideo');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then(function (stream) {
                    video.srcObject = stream;
                })
                .catch(function (error) {
                    console.log("Camera access denied or not available.");
                });
        }
    </script>
</body>

</html>
